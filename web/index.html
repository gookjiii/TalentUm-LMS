<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="School World — платформа для учителей и учеников: лента, домашние задания, расписание и чат.">
  <meta name="theme-color" content="#6C5CE7">
  <meta name="mobile-web-app-capable" content="yes">

  <meta name="google-signin-client_id" content="813433082673-4ein9utmin4551tfhp7hd6om6kdosad2.apps.googleusercontent.com">

  <!-- Syncfusion PDF Viewer dependencies loaded lazily to improve First Contentful Paint -->
  <script src="//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js" defer></script>
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js";
      } else {
        var script = document.querySelector('script[src*="pdf.min.js"]');
        if (script) {
          script.addEventListener('load', function() {
            if (window.pdfjsLib) {
              pdfjsLib.GlobalWorkerOptions.workerSrc = "//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js";
            }
          });
        }
      }
    });
  </script>

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="School World">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TalentUm</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F5F5FA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #F5F5FA;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #flutter-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6C5CE7, #A29BFE);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
    }

    .loading-logo svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .loading-title {
      font-size: 22px;
      font-weight: 800;
      color: #1A1A2E;
      letter-spacing: -0.5px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(108, 92, 231, 0.2);
      border-top-color: #6C5CE7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0F0F1A; }
      #flutter-loading { background: #0F0F1A; }
      .loading-title { color: #F0F0FF; }
    }
  </style>
</head>
<body>
  <div id="flutter-loading">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
      </svg>
    </div>
    <span class="loading-title">TalentUm</span>
    <div class="loading-spinner"></div>
  </div>

  <script>
    // removed deprecated flutterConfiguration
    
    window._flutterLoaded = false;
    window._hideFlutterLoading = function() {
      if (window._flutterLoaded) return;
      window._flutterLoaded = true;
      var el = document.getElementById('flutter-loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function() { el.remove(); }, 500);
      }
    };

    // Failsafe: hide loading after 8 seconds regardless
    setTimeout(window._hideFlutterLoading, 8000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install melos
        run: flutter pub global activate melos
      - name: Bootstrap packages
        run: melos bootstrap
      - name: Analyze
        run: melos run analyze
      - name: Test
        run: melos run test
